<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="color-scheme" content="light only">
<title>The Hanger Boutique — Pagos</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Jost:wght@300;400;500&family=Work+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    color-scheme:light only;
    --paper:#FFFFFF;
    --paper-deep:#F4F1EB;
    --ink:#17150F;
    --ink-soft:#6A665C;
    --gold:#9C7A45;
    --gold-soft:#C7A96B;
    --line:#EAE5DB;
    --whatsapp:#25A362;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html,body{margin:0;padding:0;background:#FFFFFF !important;}
  body{color:var(--ink);font-family:'Work Sans', sans-serif;-webkit-font-smoothing:antialiased;min-height:100vh;}
  @media (prefers-color-scheme: dark){html,body{background:#FFFFFF !important;color:var(--ink) !important;}}
  .page{max-width:440px;margin:0 auto;padding:30px 20px 44px;}
  .brand{text-align:center;margin-bottom:22px;}
  .brand img{width:82%;max-width:300px;height:auto;display:block;margin:0 auto;}
  .holder{text-align:center;margin:14px 0 26px;}
  .holder .eyebrow{font-family:'Jost', sans-serif;font-weight:300;font-size:10.5px;letter-spacing:.2em;text-transform:uppercase;color:var(--ink-soft);margin-bottom:5px;}
  .holder .name{font-family:'Jost', sans-serif;font-weight:400;font-size:18px;letter-spacing:.03em;color:var(--ink);}
  .id-line{display:inline-flex;align-items:center;gap:9px;background:var(--paper-deep);border-radius:3px;padding:8px 8px 8px 14px;margin-top:12px;}
  .id-line .id-label{font-family:'Jost', sans-serif;font-weight:300;font-size:10px;letter-spacing:.14em;text-transform:uppercase;color:var(--ink-soft);}
  .id-line .id-number{font-family:'Work Sans', sans-serif;font-weight:500;font-size:14px;letter-spacing:.04em;font-variant-numeric:tabular-nums;}
  .id-copy{background:none;border:1px solid var(--gold-soft);color:var(--gold);border-radius:3px;width:30px;height:30px;flex-shrink:0;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:background .15s ease,color .15s ease;}
  .id-copy svg{width:14px;height:14px;}
  .id-copy.copied{background:var(--gold);color:#fff;}
  .cta-whatsapp{display:flex;align-items:center;justify-content:center;gap:10px;width:100%;background:var(--whatsapp);color:#fff;text-decoration:none;padding:16px 18px;border-radius:3px;font-family:'Jost', sans-serif;font-weight:400;font-size:13.5px;letter-spacing:.07em;text-transform:uppercase;transition:opacity .15s ease;}
  .cta-whatsapp:active{opacity:.82;}
  .cta-whatsapp svg{width:19px;height:19px;flex-shrink:0;}
  .steps{display:flex;justify-content:space-between;gap:8px;margin:24px 0 6px;}
  .step{flex:1;text-align:center;}
  .step .num{font-family:'Jost', sans-serif;font-weight:400;font-size:13px;color:var(--gold);border:1px solid var(--gold-soft);width:23px;height:23px;border-radius:50%;display:flex;align-items:center;justify-content:center;margin:0 auto 7px;}
  .step p{font-size:10.5px;color:var(--ink-soft);margin:0;line-height:1.4;}
  .section-label{font-family:'Jost', sans-serif;font-weight:300;font-size:10.5px;letter-spacing:.2em;text-transform:uppercase;color:var(--ink-soft);text-align:center;margin:32px 0 12px;}
  .bank-list{border-top:1px solid var(--line);}
  .bank-row{border-bottom:1px solid var(--line);}
  .bank-head{display:flex;align-items:center;gap:13px;padding:15px 2px;cursor:pointer;}
  .bank-badge{width:38px;height:38px;border-radius:9px;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-family:'Jost', sans-serif;font-weight:500;font-size:15px;color:#fff;letter-spacing:.01em;}
  .bank-name{font-family:'Jost', sans-serif;font-weight:400;font-size:16px;letter-spacing:.04em;flex:1;}
  .hanger-toggle{width:21px;height:21px;flex-shrink:0;color:var(--ink-soft);transition:transform .34s cubic-bezier(.4,0,.2,1);}
  .bank-row.open .hanger-toggle{transform:rotate(90deg);}
  .bank-body{max-height:0;overflow:hidden;transition:max-height .32s ease;}
  .bank-row.open .bank-body{max-height:180px;}
  .bank-body-inner{padding:0 2px 18px 53px;}
  .account-line{display:flex;align-items:center;justify-content:space-between;background:var(--paper-deep);border-radius:3px;padding:12px 12px 12px 15px;margin-bottom:9px;}
  .account-number{font-family:'Work Sans', sans-serif;font-weight:500;font-size:16px;letter-spacing:.05em;font-variant-numeric:tabular-nums;}
  .copy-btn{background:none;border:1px solid var(--gold-soft);color:var(--gold);border-radius:3px;width:36px;height:36px;flex-shrink:0;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:background .15s ease,color .15s ease;}
  .copy-btn svg{width:16px;height:16px;}
  .copy-btn.copied{background:var(--gold);color:#fff;}
  .open-app{display:block;text-align:center;width:100%;background:var(--ink);border:1px solid var(--ink);color:#fff;padding:12px;border-radius:3px;font-family:'Jost', sans-serif;font-size:11.5px;letter-spacing:.09em;text-transform:uppercase;text-decoration:none;cursor:pointer;}
  .open-app:active{opacity:.85;}
  .footer{margin-top:36px;text-align:center;}
  .footer .wa-line{display:inline-flex;align-items:center;gap:8px;color:var(--ink-soft);text-decoration:none;font-size:13px;margin-bottom:16px;}
  .footer .wa-line svg{width:16px;height:16px;color:var(--whatsapp);}
  .footer .tag{font-family:'Jost', sans-serif;font-weight:300;font-size:10px;letter-spacing:.16em;text-transform:uppercase;color:var(--ink-soft);}
  .toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(20px);background:var(--ink);color:#fff;padding:10px 18px;border-radius:3px;font-family:'Jost', sans-serif;font-size:12px;letter-spacing:.07em;text-transform:uppercase;opacity:0;pointer-events:none;transition:opacity .2s ease,transform .2s ease;z-index:10;}
  .toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
  @media (prefers-reduced-motion:reduce){.hanger-toggle,.bank-body{transition:none;}}
</style>
</head>
